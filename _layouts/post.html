---
layout: default
---
<section class="post-header wrap">
  <span class="eyebrow">{{ page.categories | first }}</span>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <span>{% include icon.html name="calendar" %} {{ page.date | date: "%B %-d, %Y" }}</span>
    {% for cat in page.categories %}
      <span class="cat">{% include icon.html name="folder" %} {{ cat }}</span>
    {% endfor %}
  </div>
</section>
<article class="post-content wrap">
  {{ content }}
</article>
